<header class="app-header">

  <div class="top-bar container-fluid p-0">
    <div class="top-bar-content container-xl p-0 d-flex align-items-center justify-content-between">

      <!-- Logo / Marque -->
      <a class="navbar-brand me-auto"
         routerLink="/"
         routerLinkActive="active">
        <span class="brand-badge">S</span> sav-app
      </a>

      <!-- Menu utilisateur -->
      <div class="user-menu align-items-center me-3 d-flex">

        <span class="user-name text-dark bg-light rounded-1 ps-2 pe-2 me-2">
          {{ authService.getUserIdentifier() }}
        </span>

        <!-- Bouton Dropdown Bootstrap -->
        <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                type="button"
                id="userDropdown"
                data-bs-toggle="dropdown"
                aria-expanded="false">
        </button>

        <!-- Contenu du menu dropdown -->
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
          <li><a class="dropdown-item" routerLink="/login">Se connecter</a></li>
          <li><a class="dropdown-item" routerLink="/account">Mon compte</a></li>
          <li><a class="dropdown-item" routerLink="/subscribe">Créer un compte</a></li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item text-danger"
               href="#"
               (click)="authService.logout(); $event.preventDefault()">
              Déconnexion
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>

  <!-- Composant navbar -->
  <app-navbar></app-navbar>

</header>
